[custom]
; Fine-grained Clash/Mihomo config for WorkerVless2sub/subconverter
; Groups: TikTok, YouTube, Netflix, OpenAI, Telegram, Apple, Google

; ===== Rule sets =====
ruleset=OpenAI,https://raw.githubusercontent.com/ACL4SSR/ACL4SSR/master/Clash/Ruleset/OpenAi.list
ruleset=TikTok,https://raw.githubusercontent.com/blackmatrix7/ios_rule_script/master/rule/Clash/TikTok/TikTok.list
ruleset=YouTube,https://raw.githubusercontent.com/ACL4SSR/ACL4SSR/master/Clash/Ruleset/YouTube.list
ruleset=Netflix,https://raw.githubusercontent.com/ACL4SSR/ACL4SSR/master/Clash/Ruleset/Netflix.list
ruleset=Telegram,https://raw.githubusercontent.com/ACL4SSR/ACL4SSR/master/Clash/Telegram.list
ruleset=Apple,https://raw.githubusercontent.com/ACL4SSR/ACL4SSR/master/Clash/Apple.list
ruleset=Google,https://raw.githubusercontent.com/ACL4SSR/ACL4SSR/master/Clash/Ruleset/Google.list
ruleset=Microsoft,https://raw.githubusercontent.com/ACL4SSR/ACL4SSR/master/Clash/Microsoft.list
ruleset=Bahamut,https://raw.githubusercontent.com/ACL4SSR/ACL4SSR/master/Clash/Ruleset/Bahamut.list
ruleset=ProxyMedia,https://raw.githubusercontent.com/ACL4SSR/ACL4SSR/master/Clash/ProxyMedia.list
ruleset=ProxyGFWlist,https://raw.githubusercontent.com/ACL4SSR/ACL4SSR/master/Clash/ProxyGFWlist.list
ruleset=ChinaDomain,https://raw.githubusercontent.com/ACL4SSR/ACL4SSR/master/Clash/ChinaDomain.list
ruleset=ChinaCompanyIp,https://raw.githubusercontent.com/ACL4SSR/ACL4SSR/master/Clash/ChinaCompanyIp.list
ruleset=LocalAreaNetwork,https://raw.githubusercontent.com/ACL4SSR/ACL4SSR/master/Clash/LocalAreaNetwork.list
ruleset=ChinaIp,[]GEOIP,CN
ruleset=Final,[]FINAL

; ===== Policy groups =====
custom_proxy_group=节点选择`select`[]自动选择`[]故障转移`[]DIRECT`.*
custom_proxy_group=自动选择`url-test`.*`http://www.gstatic.com/generate_204`300,,50
custom_proxy_group=故障转移`fallback`.*`http://www.gstatic.com/generate_204`300,,50

custom_proxy_group=OpenAI`select`[]节点选择`[]美国自动`[]新加坡自动`[]香港自动`[]DIRECT`.*
custom_proxy_group=TikTok`select`[]节点选择`[]美国自动`[]新加坡自动`[]香港自动`[]DIRECT`.*
custom_proxy_group=YouTube`select`[]节点选择`[]香港自动`[]新加坡自动`[]美国自动`[]DIRECT`.*
custom_proxy_group=Netflix`select`[]节点选择`[]美国自动`[]新加坡自动`[]香港自动`[]DIRECT`.*
custom_proxy_group=Telegram`select`[]节点选择`[]香港自动`[]新加坡自动`[]美国自动`[]DIRECT`.*
custom_proxy_group=Apple`select`[]DIRECT`[]节点选择`[]香港自动`[]美国自动`.*
custom_proxy_group=Google`select`[]节点选择`[]香港自动`[]新加坡自动`[]美国自动`[]DIRECT`.*
custom_proxy_group=Microsoft`select`[]DIRECT`[]节点选择`[]香港自动`[]美国自动`.*
custom_proxy_group=国外媒体`select`[]节点选择`[]香港自动`[]新加坡自动`[]美国自动`.*
custom_proxy_group=国外网站`select`[]节点选择`[]香港自动`[]新加坡自动`[]美国自动`.*
custom_proxy_group=国内网站`select`[]DIRECT`[]节点选择
custom_proxy_group=漏网之鱼`select`[]节点选择`[]DIRECT`.*

custom_proxy_group=香港自动`url-test`(香港|HK|Hong Kong)`http://www.gstatic.com/generate_204`300,,50
custom_proxy_group=新加坡自动`url-test`(新加坡|SG|Singapore)`http://www.gstatic.com/generate_204`300,,50
custom_proxy_group=美国自动`url-test`(美国|US|United States|洛杉矶|圣何塞|西雅图)`http://www.gstatic.com/generate_204`300,,50
custom_proxy_group=欧洲自动`url-test`(德国|法国|英国|荷兰|欧洲|EU|Frankfurt|London|Amsterdam)`http://www.gstatic.com/generate_204`300,,50

; ===== Options =====
enable_rule_generator=true
overwrite_original_rules=true
clash_rule_base=https://raw.githubusercontent.com/ACL4SSR/ACL4SSR/master/Clash/GeneralClashConfig.yml
